{% extends 'base.html' %}

{% block title %}Login - Cantina Digital{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white text-center py-3">
                <h4 class="mb-0"><i class="bi bi-person-lock"></i> Acesso ao Sistema</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-bold">Usuário</label>
                        <input type="text" name="username" id="id_username" class="form-control" placeholder="Digite seu usuário" required>
                    </div>

                    <div class="mb-3">
                        <label for="id_password" class="form-label fw-bold">Senha</label>
                        <input type="password" name="password" id="id_password" class="form-control" placeholder="Digite sua senha" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-box-arrow-in-right"></i> Entrar
                        </button>
                    </div>
                </form>

                {% if form.errors %}
                    <div class="alert alert-danger mt-3 py-2 text-center">
                        <small>Usuário ou senha incorretos.</small>
                    </div>
                {% endif %}
            </div>
        </div>
        <div class="text-center mt-3 text-muted">
            <small>&copy; 2026 - Cantina Escolar</small>
        </div>
    </div>
</div>
{% endblock %}
