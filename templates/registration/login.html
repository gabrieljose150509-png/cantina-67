{% extends 'base.html' %}

{% block title %}Login - Cantina Digital{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height:70vh;">

    <div class="col-md-5">

        <div class="card border-0 shadow-lg rounded-5 overflow-hidden">

            <div class="text-center text-white py-4"
                 style="background: linear-gradient(135deg,#0d6efd,#003b8b);">

                <div class="mb-3">
                    <i class="bi bi-person-lock display-3 text-warning"></i>
                </div>

                <h2 class="fw-bold">Bem-vindo</h2>
                <p class="mb-0 text-light">Faça login para acessar o sistema</p>
            </div>

            <div class="card-body p-5 bg-white">

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label for="id_username" class="form-label fw-bold text-primary">
                            Usuário
                        </label>

                        <div class="input-group">
                            <span class="input-group-text bg-primary text-white border-0">
                                <i class="bi bi-person"></i>
                            </span>

                            <input type="text"
                                   name="username"
                                   id="id_username"
                                   class="form-control form-control-lg"
                                   placeholder="Digite seu usuário"
                                   required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-bold text-primary">
                            Senha
                        </label>

                        <div class="input-group">
                            <span class="input-group-text bg-primary text-white border-0">
                                <i class="bi bi-lock"></i>
                            </span>

                            <input type="password"
                                   name="password"
                                   id="id_password"
                                   class="form-control form-control-lg"
                                   placeholder="Digite sua senha"
                                   required>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit"
                                class="btn btn-warning btn-lg fw-bold rounded-pill shadow">
                            <i class="bi bi-box-arrow-in-right"></i>
                            Entrar
                        </button>
                    </div>
                </form>

                {% if form.errors %}
                <div class="alert alert-danger text-center mt-4 border-0 rounded-4">
                    Usuário ou senha incorretos.
                </div>
                {% endif %}
            </div>
        </div>

        <div class="text-center mt-4 text-muted">
            <small>&copy; 2026 - Cantina Escolar</small>
        </div>

    </div>
</div>
{% endblock %}
